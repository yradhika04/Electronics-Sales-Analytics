version: 2

models:
  - name: mrt_marketing__cohort
    description: "Customer revenue and retention grouped by their first purchase year, one row per cohort year and purchase year combination"
    columns:
      - name: cohort_year
        description: "The year a customer made their first purchase, used to define the cohort"
        data_tests:
          - not_null
      - name: purchase_year
        description: "Any calendar year in which purchases were made"
        data_tests:
          - not_null
      - name: years_since_first_purchase
        description: "Number of years since the cohort's first purchase year, 0 = first year"
      - name: total_customers
        description: "Number of distinct customers from the cohort who made a purchase in this year"
      - name: total_revenue
        description: "Total revenue generated by the cohort in this purchase year in USD"
      - name: total_orders
        description: "Total number of orders placed by the cohort in this purchase year"

    data_tests:
      - unique:
          arguments:
            column_name: "cohort_year || '-' || purchase_year"